{{- if .Values.deployment.skaha.priorityClass.create }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ include "skaha.apiPriorityClassName" . | required "deployment.skaha.priorityClass.name (or legacy priorityClassName) is required when create is true" }}
  labels:
    {{- include "skaha.labels" $ | nindent 4 }}
value: {{ .Values.deployment.skaha.priorityClass.value }}
preemptionPolicy: {{ .Values.deployment.skaha.priorityClass.preemptionPolicy }}
globalDefault: {{ .Values.deployment.skaha.priorityClass.globalDefault }}
description: {{ .Values.deployment.skaha.priorityClass.description | quote }}
{{- end }}
{{- $hpc := .Values.deployment.skaha.headlessPriorityClass }}
{{- if and (kindIs "map" $hpc) $hpc.create }}
{{- if .Values.deployment.skaha.priorityClass.create }}
---
{{- end }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ $hpc.name | required "deployment.skaha.headlessPriorityClass.name is required when create is true" }}
  labels:
    {{- include "skaha.labels" $ | nindent 4 }}
value: {{ $hpc.value }}
preemptionPolicy: {{ $hpc.preemptionPolicy }}
globalDefault: {{ $hpc.globalDefault }}
description: {{ $hpc.description | quote }}
{{- end }}
