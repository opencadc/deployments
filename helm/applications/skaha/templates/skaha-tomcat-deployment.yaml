apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: skaha-tomcat
  name: skaha-tomcat
  namespace: {{ .Values.skaha.namespace }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      run: skaha-tomcat
  template:
    metadata:
      creationTimestamp: null
      labels:
        run: skaha-tomcat
    spec:
{{- with .Values.deployment.skaha.nodeAffinity }}
      affinity:
        nodeAffinity:
{{ . | toYaml | indent 10 }}
{{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - env:
      {{- with .Values.deployment.skaha.sessions.userStorage.admin | required "Missing .Values.deployment.skaha.sessions.userStorage.admin configuration" }}
      {{- if .auth.oidc }}
      {{- with .auth.oidc }}
        - name: SKAHA_USER_STORAGE_ADMIN_USERNAME
          value: "{{ .adminUsername | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.auth.oidc.adminUsername" }}"
        - name: SKAHA_USER_STORAGE_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .adminPasswordSecret.name | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.auth.oidc.adminPasswordSecret.name" }}
              key: {{ .adminPasswordSecret.key | default "adminPassword" }}
        - name: SKAHA_USER_STORAGE_ADMIN_OIDC_CLIENT_ID
          value: "{{ .clientID | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.auth.oidc.clientID" }}"
        - name: SKAHA_USER_STORAGE_ADMIN_OIDC_CLIENT_SECRET
          {{- if .existingSecret }}
          valueFrom:
            secretKeyRef:
              name: {{ .existingSecret.name | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.auth.oidc.existingSecret.name" }}
              key: {{ .existingSecret.key | default "clientSecret" }}
          {{- else }}
          value: "{{ .clientSecret }}"
          {{- end }}
        - name: SKAHA_USER_STORAGE_ADMIN_OIDC_URI
          value: "{{ $.Values.deployment.skaha.oidcURI | required "Missing .Values.deployment.skaha.oidcURI" }}"
      {{- end }}
      {{- else if .auth.certificateSecret }}
      {{- with .auth.certificateSecret -}}
        - name: SKAHA_USER_STORAGE_ADMIN_CERTIFICATE
          valueFrom:
            secretKeyRef:
              name: {{ .name | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.certificateSecret.name" }}
              key: {{ .key | default "cadcproxy.pem" }}
      {{- end }}
      {{- else }}
      {{- fail "Neither .Values.deployment.skaha.sessions.userStorage.admin.oidc nor .Values.deployment.skaha.sessions.userStorage.admin.certificateSecret specified." }}
      {{- end }}
        - name: SKAHA_USER_STORAGE_ADMIN_SERVICE_URI
          value: "{{ .serviceURI | required "Missing .Values.deployment.skaha.sessions.userStorage.admin.serviceURI" }}"
        - name: SKAHA_USER_STORAGE_ADMIN_USER_HOME_URI
          value: "{{ template "skaha.job.userStorage.homeURI" $ }}"
        - name: SKAHA_USER_STORAGE_HOME_BASE_DIRECTORY
          value: "{{ template "skaha.job.userStorage.homeBaseDirectory" $ }}"
      {{- end }}
        - name: SKAHA_SESSIONS_HOSTNAME
          value: "{{ .Values.deployment.skaha.sessions.hostname | default .Values.deployment.hostname }}"
        - name: SKAHA_HOSTNAME
          value: "{{ .Values.deployment.hostname | required "Missing .Values.deployment.hostname" }}"
        - name: GPU_ENABLED
          value: "{{ .Values.deployment.skaha.sessions.gpuEnabled | default "false" }}"
        - name: skaha.namespace
          value: "{{ .Values.skahaWorkload.namespace }}"
        - name: skaha.maxusersessions
          value: "{{ .Values.deployment.skaha.sessions.maxCount }}"
        - name: skaha.sessionexpiry
          value: "{{ .Values.deployment.skaha.sessions.expirySeconds }}"
{{- if not (regexMatch "[0-9\\.?]+$" .Values.deployment.skaha.defaultQuotaGB) }}
  {{- fail "Invalid format for .Values.deployment.skaha.defaultQuotaGB (should be in the format of 'number' (e.g. 10, 45.8))" }}
{{- end }}
        - name: skaha.defaultquotagb
          value: "{{ .Values.deployment.skaha.defaultQuotaGB }}"
        - name: skaha.harborhosts
          value: "{{ .Values.deployment.skaha.registryHosts }}"
        - name: skaha.usersgroup
          value: "{{ .Values.deployment.skaha.usersGroup }}"
        - name: skaha.headlessgroup
          value: "{{ .Values.deployment.skaha.headlessGroup }}"
        {{- with .Values.deployment.skaha.headlessPriorityGroup }}
        - name: skaha.headlessprioritygroup
          value: "{{ . }}"
        {{- end }}
        {{- with .Values.deployment.skaha.headlessPriorityClass }}
        - name: skaha.headlesspriortyclass
          value: "{{ . }}"
        {{- end }}
        {{- with .Values.deployment.skaha.sessions.queue }}
        {{- range $queueConfigKey, $queueConfig := . }}
        - name: SKAHA_QUEUE_{{ $queueConfigKey | upper }}_NAME
          value: "{{ $queueConfig.queueName | required (printf "Missing .Values.deployment.skaha.sessions.queue.%s.queueName" $queueConfigKey) }}"
        - name: SKAHA_QUEUE_{{ $queueConfigKey | upper }}_PRIORITY_CLASS
          value: "{{ $queueConfig.priorityClass | required (printf "Missing .Values.deployment.skaha.sessions.queue.%s.priorityClass" $queueConfigKey) }}"
        {{- end }}
        {{- end }}
        - name: skaha.adminsgroup
          value: "{{ .Values.deployment.skaha.adminsGroup }}"
        - name: skaha.posixmapper.resourceid
          value: "{{ .Values.deployment.skaha.posixMapperResourceID }}"
        - name: REDIS_HOST
          value: "{{ .Release.Name }}-redis-master.{{ .Values.skaha.namespace }}.svc.{{ .Values.kubernetesClusterDomain }}"
        - name: REDIS_PORT
          value: "6379"
        {{- with .Values.deployment.skaha.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        image: {{ .Values.deployment.skaha.image }}
        imagePullPolicy: {{ .Values.deployment.skaha.imagePullPolicy }}
        name: skaha-tomcat
        resources:
          requests:
            memory: {{ .Values.deployment.skaha.resources.requests.memory }}
            cpu: {{ .Values.deployment.skaha.resources.requests.cpu }}
          limits:
            memory: {{ .Values.deployment.skaha.resources.limits.memory }}
            cpu: {{ .Values.deployment.skaha.resources.limits.cpu }}
        ports: 
        - containerPort: 8080
          protocol: TCP
        {{- with .Values.deployment.skaha.extraPorts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - mountPath: "/config"
          name: config-volume
        - mountPath: "/add-user-config"
          name: add-user-config
        {{- with .Values.deployment.skaha.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: false
{{- with .Values.deployment.extraHosts }}
      hostAliases:
{{- range $extraHost := . }}
        - ip: {{ $extraHost.ip }}
          hostnames:
            - {{ $extraHost.hostname }}
{{- end }}
{{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: {{ .Values.deployment.skaha.priorityClassName }}
      serviceAccountName: {{ .Values.deployment.skaha.serviceAccountName }}
      volumes:
      - name: config-volume
        configMap:
          name: skaha-config
      - name: add-user-config
        configMap:
          name: add-user-config
      {{- with .Values.deployment.skaha.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
