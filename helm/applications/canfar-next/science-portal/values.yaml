# Default values for science-portal (CANFAR Next.js Science Portal).
# https://github.com/canfar/science-portal
# Deployers supply runtime env (NextAuth, APIs, etc.); see upstream .env.example.

replicaCount: 1

image:
  repository: ghcr.io/canfar/science-portal
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: a533c61377855853f23a0fc9dba9592e21fe688d

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# Optional pod security context (image runs as nextjs uid 1001).
# Next.js may need a writable /tmp; readOnlyRootFilesystem is often false.
podSecurityContext: {}
# podSecurityContext:
#   runAsNonRoot: true
#   runAsUser: 1001
#   runAsGroup: 1001
#   fsGroup: 1001
#   seccompProfile:
#     type: RuntimeDefault

securityContext: {}
# securityContext:
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop:
#       - ALL
#   readOnlyRootFilesystem: false

# Must match NEXT_PUBLIC_BASE_PATH in the container image when non-empty (e.g. /canfar-app).
app:
  basePath: ""

service:
  type: ClusterIP
  # Port exposed on the Service (Ingress/Gateway often expect 80).
  port: 80
  # Port the Next.js process listens on inside the container.
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: science-portal.example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API HTTPRoute (https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - science-portal.example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}
# resources:
#   limits:
#     cpu: 1000m
#     memory: 1Gi
#   requests:
#     cpu: 100m
#     memory: 256Mi

# Probe httpGet.path is set in the chart from app.basePath + /api/health (or .../ready).
livenessProbe:
  httpGet:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Gives the app time to listen before liveness failures (Next.js standalone cold start).
startupProbe:
  httpGet:
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Kubernetes container env entries (name / value / valueFrom).
# See upstream .env.example for NEXT_PUBLIC_*, AUTH_SECRET, NEXTAUTH_URL, etc.
env: []
# env:
#   - name: NEXTAUTH_URL
#     value: "https://example.org"
#   - name: AUTH_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: science-portal-secrets
#         key: auth-secret

envFrom: []
# envFrom:
#   - secretRef:
#       name: science-portal-secrets
# envFrom:
#   - configMapRef:
#       name: science-portal-config

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
