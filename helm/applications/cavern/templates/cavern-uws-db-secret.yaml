{{- $db := .Values.deployment.cavern.uws.db -}}
{{- $auth := $db.auth | default dict -}}
{{- if and (not $auth.existingSecret) $auth.username $auth.password }}
{{- $sk := $auth.secretKeys | default dict -}}
{{- $userKey := $sk.username | default "username" -}}
{{- $passKey := $sk.password | default "password" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cavern.uwsDbAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cavern.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $userKey }}: {{ $auth.username | quote }}
  {{ $passKey }}: {{ $auth.password | quote }}
{{- end }}
