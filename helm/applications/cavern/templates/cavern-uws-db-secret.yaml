{{- $db := .Values.deployment.cavern.uws.db -}}
{{- $auth := $db.auth | default dict -}}
{{- $u := include "cavern.uwsDbInlineUsername" . | trim -}}
{{- $p := include "cavern.uwsDbInlinePassword" . | trim -}}
{{- if and (empty $auth.existingSecret) (not (empty $u)) (not (empty $p)) }}
{{- $sk := $auth.secretKeys | default dict -}}
{{- $userKey := $sk.username | default "username" -}}
{{- $passKey := $sk.password | default "password" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cavern.uwsDbAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cavern.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $userKey }}: {{ $u | quote }}
  {{ $passKey }}: {{ $p | quote }}
{{- end }}
