{{ $containerPort := 8080 }}
{{ $storageSpecYAML := required "A valid .Values.storage.service.spec is required!" .Values.storage.service.spec }}
{{- $db := .Values.deployment.cavern.uws.db -}}
{{- $auth := $db.auth | default dict -}}
{{- $sk := $auth.secretKeys | default dict -}}
{{- $userKey := $sk.username | default "username" -}}
{{- $passKey := $sk.password | default "password" -}}
{{- $uwsDbSecretName := include "cavern.uwsDbAuthSecretName" . -}}
{{- $hasAdminSecretKeys := false }}
{{- range $_, $spec := .Values.deployment.cavern.adminAPIKeys }}
{{- if and (kindIs "map" $spec) $spec.existingSecret }}
{{- $hasAdminSecretKeys = true }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: {{ .Release.Name }}-tomcat
  name: {{ .Release.Name }}-tomcat
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      run: {{ .Release.Name }}-tomcat
  template:
    metadata:
      creationTimestamp: null
      labels:
        run: {{ .Release.Name }}-tomcat
    spec:
{{- with .Values.deployment.cavern.nodeAffinity }}
      affinity:
        nodeAffinity:
{{ . | toYaml | indent 10 }}
{{- end }}
      securityContext:
        {{- $ro := .Values.deployment.cavern.filesystem.rootOwner | default dict }}
        {{- if and $ro (hasKey $ro "gid") (ne (index $ro "gid") nil) }}
        fsGroup: {{ index $ro "gid" }}
        {{- end }}
        {{- with .Values.volumeInit.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      initContainers:
        - name: merge-uws-db-credentials
          image: {{ .Values.volumeInit.image | quote }}
          imagePullPolicy: {{ .Values.volumeInit.imagePullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              cp -R /config-src/. /config-dst/
              USER=$(tr -d '\n' < "/secret/${USER_KEY}")
              PASS=$(tr -d '\n' < "/secret/${PASS_KEY}")
              printf '\norg.opencadc.cavern.uws.username=%s\n' "$USER" >> /config-dst/catalina.properties
              printf 'org.opencadc.cavern.uws.password=%s\n' "$PASS" >> /config-dst/catalina.properties
{{ if $hasAdminSecretKeys }}
{{- range $clientName, $spec := .Values.deployment.cavern.adminAPIKeys }}
{{- if and (kindIs "map" $spec) $spec.existingSecret }}
              API_KEY_VAL=$(tr -d '\n' < "/admin-api-keys/{{ $clientName }}")
              printf '\norg.opencadc.cavern.adminAPIKey = %s:%s\n' '{{ $clientName }}' "$API_KEY_VAL" >> /config-dst/cavern.properties
{{- end }}
{{- end }}
{{ end }}
          env:
            - name: USER_KEY
              value: {{ $userKey | quote }}
            - name: PASS_KEY
              value: {{ $passKey | quote }}
          volumeMounts:
            - name: config-source
              mountPath: /config-src
              readOnly: true
            - name: uws-db-secret
              mountPath: /secret
              readOnly: true
{{ if $hasAdminSecretKeys }}
            - name: admin-api-keys
              mountPath: /admin-api-keys
              readOnly: true
{{ end }}
            - name: config-merged
              mountPath: /config-dst
          {{- with .Values.volumeInit.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
      - image: {{ .Values.deployment.cavern.image }}
        imagePullPolicy: {{ .Values.deployment.cavern.imagePullPolicy }}
        name: {{ .Release.Name }}-tomcat
        resources:
          requests:
            memory: {{ .Values.deployment.cavern.resources.requests.memory }}
            cpu: {{ .Values.deployment.cavern.resources.requests.cpu }}
          limits:
            memory: {{ .Values.deployment.cavern.resources.limits.memory }}
            cpu: {{ .Values.deployment.cavern.resources.limits.cpu }}
        securityContext:
          allowPrivilegeEscalation: false
        {{- with .Values.deployment.cavern.extraEnv }}
        env:
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - containerPort: {{ $containerPort }}
          protocol: TCP
        {{- with .Values.deployment.cavern.extraPorts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - mountPath: "/config"
          name: config-merged
        - mountPath: '{{ .Values.deployment.cavern.filesystem.dataDir | required ".deployment.cavern.filesystem.dataDir is required" }}'
          name: cavern-volume
        {{- with .Values.deployment.cavern.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- with .Values.deployment.extraHosts }}
      hostAliases:
{{- range $extraHost := . }}
        - ip: {{ $extraHost.ip }}
          hostnames:
            - {{ $extraHost.hostname }}
{{- end }}
{{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: uber-user-preempt-high
      {{- with .Values.serviceAccount.name }}
      serviceAccountName: {{ . }}
      {{- end }}
      volumes:
      - name: config-source
        configMap:
          name: {{ .Release.Name }}-config
      - name: uws-db-secret
        secret:
          secretName: {{ $uwsDbSecretName }}
{{ if $hasAdminSecretKeys }}
      - name: admin-api-keys
        projected:
          sources:
{{- range $clientName, $spec := .Values.deployment.cavern.adminAPIKeys }}
{{- if and (kindIs "map" $spec) $spec.existingSecret }}
            - secret:
                name: {{ $spec.existingSecret }}
                items:
                  - key: {{ $spec.key | quote }}
                    path: {{ $clientName | quote }}
{{- end }}
{{- end }}
{{ end }}
      - name: config-merged
        emptyDir: {}
      {{- if $storageSpecYAML }}
      - name: cavern-volume
        {{- toYaml $storageSpecYAML | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.cavern.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
