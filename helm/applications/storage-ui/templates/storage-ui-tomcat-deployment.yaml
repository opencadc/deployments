apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: storage-ui-tomcat
  name: storage-ui-tomcat
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      run: storage-ui-tomcat
  template:
    metadata:
      labels:
        run: storage-ui-tomcat
    spec:
      {{- $podSC := .Values.podSecurityContext | default dict }}
      {{- $contSC := .Values.securityContext | default dict }}
      {{- $legacyPodFallback := and (empty $podSC) (not (empty $contSC)) }}
      {{- $effectivePodSC := ternary $contSC $podSC $legacyPodFallback }}
      {{- $oidcSecretName := get (.Values.deployment.storageUI.oidc | default dict) "existingSecretName" }}
      {{- $cspkRoot := (.Values.deployment.storageUI.cookieSignaturePublicKey | default dict) }}
      {{- $cspkRef := ($cspkRoot.existingSecret | default dict) }}
      {{- $cookiePubSecretName := trim (($cspkRef.name | default "") | toString) }}
      {{- $cookiePubMountPath := "" }}
      {{- if trim (($cspkRef.path | default "") | toString) }}
      {{- $cookiePubMountPath = trim (($cspkRef.path | default "") | toString) }}
      {{- else }}
      {{- $cookiePubMountPath = "RsaSignaturePub.key" }}
      {{- end }}
      {{- with .Values.deployment.storageUI.nodeAffinity }}
      affinity:
        nodeAffinity:
          {{- toYaml . | nindent 10 }}
      {{- end }}
      {{- if not (empty $effectivePodSC) }}
      securityContext:
        {{- toYaml $effectivePodSC | nindent 8 }}
      {{- end }}
      imagePullSecrets:
        - name: regcred
      {{- if $oidcSecretName }}
      initContainers:
      - image: {{ .Values.deployment.storageUI.image }}
        imagePullPolicy: {{ .Values.deployment.storageUI.imagePullPolicy }}
        name: storage-ui-config
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          cp -R /config-template/. /config
          printf '\norg.opencadc.vosui.oidc.clientSecret = %s\n' "$OIDC_CLIENT_SECRET" >> /config/org.opencadc.vosui.properties
        env:
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $oidcSecretName }}
              key: clientSecret
        volumeMounts:
        - mountPath: "/config-template"
          name: config-template-volume
        - mountPath: "/config"
          name: config-volume
      {{- end }}
      containers:
      - image: {{ .Values.deployment.storageUI.image }}
        imagePullPolicy: {{ .Values.deployment.storageUI.imagePullPolicy }}
        name: storage-ui-tomcat
        resources:
          requests:
            memory: {{ .Values.deployment.storageUI.resources.requests.memory }}
            cpu: {{ .Values.deployment.storageUI.resources.requests.cpu }}
          limits:
            memory: {{ .Values.deployment.storageUI.resources.limits.memory }}
            cpu: {{ .Values.deployment.storageUI.resources.limits.cpu }}
        ports:
        - containerPort: 8080
          protocol: TCP
        {{- with .Values.deployment.storageUI.extraPorts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - mountPath: "/config"
          name: config-volume
        {{- with .Values.deployment.storageUI.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if not $legacyPodFallback }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        {{- if .Values.deployment.storageUI.extraEnv }}
        env:
        {{- with .Values.deployment.storageUI.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
{{- with .Values.deployment.extraHosts }}
      hostAliases:
{{- range $extraHost := . }}
        - ip: {{ $extraHost.ip }}
          hostnames:
            - {{ $extraHost.hostname }}
{{- end }}
{{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if $oidcSecretName }}
      - name: config-volume
        emptyDir: {}
      - name: config-template-volume
        {{- if $cookiePubSecretName }}
        projected:
          sources:
          - configMap:
              name: storage-ui-config
          - secret:
              name: {{ $cookiePubSecretName }}
              items:
              - key: RsaSignaturePub.key
                path: {{ $cookiePubMountPath }}
        {{- else }}
        configMap:
          name: storage-ui-config
        {{- end }}
      {{- else if $cookiePubSecretName }}
      - name: config-volume
        projected:
          sources:
          - configMap:
              name: storage-ui-config
          - secret:
              name: {{ $cookiePubSecretName }}
              items:
              - key: RsaSignaturePub.key
                path: {{ $cookiePubMountPath }}
      {{- else }}
      - name: config-volume
        configMap:
          name: storage-ui-config
      {{- end }}
      {{- with .Values.deployment.storageUI.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
