apiVersion: v1
kind: Pod
metadata:
  name: '{{ include "science-portal.fullname" . }}-test-connection'
  labels:
    {{- include "science-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args:
        - "-qO-"
        - 'http://{{ include "science-portal.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}{{ include "science-portal.healthPathLiveness" . }}'
  restartPolicy: Never
