apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "science-portal.fullname" . }}
  labels:
    {{- include "science-portal.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "science-portal.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "science-portal.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "science-portal.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ default .Values.service.port .Values.service.targetPort }}
              protocol: TCP
          {{- $skipNames := dict }}
          {{- range .Values.env }}
          {{- $_ := set $skipNames .name true }}
          {{- end }}
          {{- $genEnv := include "science-portal.generatedEnv" (dict "root" . "skipNames" $skipNames) | trim }}
          {{- if or $genEnv .Values.env }}
          env:
            {{- if $genEnv }}
            {{- $genEnv | nindent 12 }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          {{- $live := deepCopy .Values.livenessProbe }}
          {{- $_ := set $live.httpGet "path" (include "science-portal.healthPathLiveness" .) }}
          livenessProbe:
            {{- toYaml $live | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          {{- $ready := deepCopy .Values.readinessProbe }}
          {{- $_ := set $ready.httpGet "path" (include "science-portal.healthPathReadiness" .) }}
          readinessProbe:
            {{- toYaml $ready | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          {{- $start := deepCopy . }}
          {{- $_ := set $start.httpGet "path" (include "science-portal.healthPathLiveness" $) }}
          startupProbe:
            {{- toYaml $start | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
