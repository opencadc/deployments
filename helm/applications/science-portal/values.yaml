# Default values for science-portal (CANFAR Next.js Science Portal).
# https://github.com/canfar/science-portal

replicaCount: 1

# -- Container image (repository and tag).
image:
  repository: ghcr.io/canfar/science-portal
  pullPolicy: IfNotPresent
  tag: bc4e93974d16b4ab64dc62334a723929c349d647

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# Optional pod security context (image runs as nextjs uid 1001).
podSecurityContext: {}
# podSecurityContext:
#   runAsNonRoot: true
#   runAsUser: 1001
#   runAsGroup: 1001
#   fsGroup: 1001
#   seccompProfile:
#     type: RuntimeDefault

securityContext: {}
# securityContext:
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop:
#       - ALL
#   readOnlyRootFilesystem: false

# -- Product / application settings mapped to container env. Prefer over raw `env` for options from [upstream .env.example](https://github.com/canfar/science-portal/blob/main/.env.example). Many `NEXT_PUBLIC_*` values are fixed at **image build**; runtime env here mainly affects the server unless your image supports overrides.
app:
  # -- URL path prefix; must match `NEXT_PUBLIC_BASE_PATH` in the image. When non-empty, sets env `NEXT_PUBLIC_BASE_PATH`. HTTP probes hit this path (or /science-portal when empty).
  basePath: ""
  # -- Server-side API URLs (`SERVICE_STORAGE_API`, `LOGIN_API`, `SKAHA_API`, `SRC_*`, `API_TIMEOUT`). Empty keys are omitted.
  api:
    storage: ""
    login: ""
    skaha: ""
    srcSkaha: ""
    srcCavern: ""
    timeoutMs: ""
  # -- Client-side API URLs (`NEXT_PUBLIC_*`). Empty keys are omitted (image build defaults apply).
  publicApi:
    login: ""
    skaha: ""
    srcSkaha: ""
    srcCavern: ""
    timeoutMs: ""
  # useCanfar: true  # boolean: sets NEXT_USE_CANFAR and NEXT_PUBLIC_USE_CANFAR (omit key for image defaults)
  # experimental: false  # boolean -> NEXT_PUBLIC_EXPERIMENTAL
  # enableQueryDevtools: false  # boolean -> NEXT_PUBLIC_ENABLE_QUERY_DEVTOOLS
  # -- OIDC settings. When `enabled` and `uri` are set, emits paired NEXT_OIDC_* / NEXT_PUBLIC_OIDC_* env vars. Use with useCanfar: false. Client secret via existingSecret + secretKey only.
  oidc:
    enabled: false
    uri: ""
    clientId: ""
    callbackUri: ""
    redirectUri: ""
    scope: ""
    clientSecret:
      existingSecret: ""
      secretKey: ""
  # -- NextAuth (`AUTH_TRUST_HOST`, `NEXTAUTH_URL`, optional `AUTH_SECRET` from Secret refs).
  auth:
    # trustHost: false
    nextauthUrl: ""
    authSecret:
      existingSecret: ""
      secretKey: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: science-portal.example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - science-portal.example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}

livenessProbe:
  httpGet:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# -- Extra container `env` entries (Kubernetes native). Merged **after** chart-generated env from `app`. If a variable name appears here, the chart **skips** emitting that name from `app` (no duplicate keys). Use for secrets and overrides.
env: []
# env:
#   - name: EXTRA_VAR
#     value: "x"

# -- Optional `envFrom` (Secret/ConfigMap refs).
envFrom: []
# envFrom:
#   - secretRef:
#       name: science-portal-secrets

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
